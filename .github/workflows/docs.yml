name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "packages/agent-ui/ts/**"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "packages/agent-ui/ts/**"
      - ".github/workflows/docs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- mkdocs site (Python) -------------------------------------------------
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt
      - run: pip install -r docs/requirements.txt
      - run: mkdocs build --strict --site-dir _site

      # --- Storybook (Node) ----------------------------------------------------
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Storybook is generated *into* the mkdocs site so a single Pages
      # deployment serves both `/` (docs) and `/storybook/` (UI).
      - name: Build Storybook
        env:
          STORYBOOK_DISABLE_TELEMETRY: "1"
          CI: "1"
        run: pnpm --filter @steerable/agent-ui storybook:build
      - name: Embed Storybook into mkdocs site
        run: |
          mkdir -p _site/storybook
          cp -R packages/agent-ui/ts/storybook-static/. _site/storybook/

      - uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/main'
        with:
          path: _site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
