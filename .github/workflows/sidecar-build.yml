name: Sidecar build

on:
  workflow_dispatch:
  push:
    tags: ["sidecar-v*"]

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
          - os: macos-13
            target: darwin-x64
          - os: ubuntu-22.04
            target: linux-x64
          - os: windows-2022
            target: win32-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sidecar bundle
        # 780 MB per-target size budget. Strip + aggressive removes unused
        # stdlib, __pycache__, dist-info metadata, pip/setuptools, and
        # third-party tests/examples/docs trees, but with the current
        # `install_only` python-build-standalone variant the bundle still
        # lands around ~700-740 MB on Linux x64. The 780 MB budget catches a
        # large regression while staying compatible with what the build
        # actually produces today.
        # TODO: when build_sidecar.py migrates to `install_only_stripped`
        # (see TODO.md), drop this back to ~300 MB to match the original
        # design intent.
        run: |
          python packages/sidecar/build/build_sidecar.py \
            --target ${{ matrix.target }} \
            --strip-stdlib \
            --aggressive \
            --budget-mb 780
      - name: Report bundle size
        run: |
          python -c "import json,pathlib; m=json.loads(pathlib.Path('packages/sidecar/dist/python-runtime/${{ matrix.target }}/manifest.json').read_text()); mb=m['totalBytes']/1024/1024; print(f'::notice title=Sidecar bundle size::${{ matrix.target }}: {mb:.1f} MB')"
      - uses: actions/upload-artifact@v5
        with:
          name: steerable-sidecar-${{ matrix.target }}
          path: packages/sidecar/dist/python-runtime/${{ matrix.target }}
          if-no-files-found: error
