name: DCO

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate Signed-off-by
        run: |
          COMMITS=$(git rev-list --no-merges origin/${{ github.base_ref }}..HEAD)
          for c in $COMMITS; do
            git log -1 --pretty=%B "$c" | rg -q "Signed-off-by:" || {
              echo "Missing Signed-off-by in commit $c"
              exit 1
            }
          done
