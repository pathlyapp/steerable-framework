name: VRT baselines (manual)

# Manually-triggered helper that regenerates the Linux Playwright VRT
# baselines for `@steerable/agent-ui` on the same `ubuntu-22.04` runner the
# `Storybook quality` workflow uses for enforcement, then uploads the
# resulting `*-chromium-desktop-linux.png` files as a single artifact.
#
# Why a separate workflow:
#   * `scripts/generate-vrt-baselines-linux.sh` requires Docker and a
#     reliable pull of the ~1.5GB `mcr.microsoft.com/playwright` image,
#     which is unreliable from some networks. This workflow side-steps
#     the local Docker dependency entirely and uses *exactly* the OS image
#     the gating job runs on, eliminating the cross-runner drift class.
#   * It is `workflow_dispatch` only so it never runs automatically; once
#     the baselines have been committed and the gating job is green, this
#     workflow can be removed (it is intended as a one-shot bootstrapper).
#
# Workflow:
#   1. Trigger from the Actions UI (or via `gh workflow run`).
#   2. Wait for the run to finish (~5 minutes).
#   3. Download the `vrt-baselines-linux` artifact.
#   4. Unzip into `packages/agent-ui/ts/tests/visual/stories.spec.ts-snapshots/`
#      and commit alongside the corresponding source change.

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you regenerating baselines? (free text)"
        required: false
        default: "initial Linux baseline bootstrap"

permissions:
  contents: read

jobs:
  generate:
    name: regenerate baselines on ubuntu-22.04
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers (chromium only)
        run: pnpm --filter @steerable/agent-ui exec playwright install --with-deps chromium

      - name: Build Storybook
        env:
          STORYBOOK_DISABLE_TELEMETRY: "1"
          CI: "1"
        run: pnpm --filter @steerable/agent-ui storybook:build

      - name: Generate snapshots
        working-directory: packages/agent-ui/ts
        # Note: vrt:update never fails on a missing baseline — it always
        # writes the screenshots out as the new source-of-truth.
        run: pnpm storybook:vrt:update

      - name: Show what was produced
        working-directory: packages/agent-ui/ts/tests/visual/stories.spec.ts-snapshots
        run: |
          echo "Generated baselines:"
          ls -1 *-chromium-desktop-linux.png | sort
          echo
          echo "Total: $(ls *-chromium-desktop-linux.png | wc -l)"

      - name: Upload baselines artifact
        uses: actions/upload-artifact@v4
        with:
          name: vrt-baselines-linux
          path: packages/agent-ui/ts/tests/visual/stories.spec.ts-snapshots/*-chromium-desktop-linux.png
          if-no-files-found: error
          retention-days: 7
