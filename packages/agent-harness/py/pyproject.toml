[project]
name = "steerable-agent-harness"
version = "0.2.3"
description = "Steerable harness helpers for Python"
readme = "README.md"
requires-python = ">=3.10"
# Pre-1.0 inter-package pin uses a `>=X,<1.0.0` range — flexible enough
# that any 0.x lockstep version installs cleanly. Lockstep across all 7
# Steerable packages is enforced separately by
# scripts/check_lockstep_versions.py + the release.yml gate.
# Tighten to `~=1.0` post-GA.
dependencies = [
  "pydantic>=2.10.0",
  "steerable-agent-protocol>=0.1.0,<1.0.0",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.uv.sources]
steerable-agent-protocol = { workspace = true }
