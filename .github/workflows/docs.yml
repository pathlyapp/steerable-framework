name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "packages/agent-ui/ts/**"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "packages/agent-ui/ts/**"
      - ".github/workflows/docs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # --- mkdocs site (Python) -------------------------------------------------
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt
      - run: pip install -r docs/requirements.txt
      - run: mkdocs build --strict --site-dir _site

      # --- Storybook (Node) ----------------------------------------------------
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Storybook is generated *into* the mkdocs site so a single Pages
      # deployment serves both `/` (docs) and `/storybook/` (UI).
      - name: Build Storybook
        env:
          STORYBOOK_DISABLE_TELEMETRY: "1"
          CI: "1"
        run: pnpm --filter @steerable/agent-ui storybook:build
      - name: Embed Storybook into mkdocs site
        run: |
          mkdir -p _site/storybook
          cp -R packages/agent-ui/ts/storybook-static/. _site/storybook/

      # D4 (docs render smoke test): mkdocs build --strict already passes when
      # markdown is *parseable*, but that is not enough. Pinning
      # `pymdown-extensions==10.12` produced fully-built HTML where every
      # fenced code block was rendered as a literal `<p>` containing the
      # backticks (commit 91fb79d). The probes below grep the rendered HTML
      # for known signal patterns so the same class of "build green, output
      # broken" regression fails fast in CI.
      #
      # Each probe is its own `run:` step so:
      #   1. The failing step name in the GitHub UI tells you exactly which
      #      invariant broke.
      #   2. Each script body is small enough that a stray bash quote / paren
      #      in an error message can't take down the whole gate (which bit us
      #      once with a one-shot multi-probe script).
      - name: D4 probe 1 — no literal triple-backtick leaked into a <p>
        run: |
          if grep -RE '<p>```' _site --include='*.html' >/tmp/probe1.txt ; then
            echo "::error::Fenced-code parsing is broken: triple-backtick fence leaked into a paragraph tag."
            cat /tmp/probe1.txt | head -10
            exit 1
          fi
      - name: D4 probe 2 — home page Tier diagram is a Mermaid graph BT block
        run: |
          if ! grep -q '<pre class="mermaid"><code>graph BT' _site/index.html ; then
            echo "::error::Home page Tier diagram is no longer a Mermaid pre.mermaid block."
            exit 1
          fi
      - name: D4 probe 3 — sidecar boot sequence is a Mermaid sequenceDiagram
        run: |
          if ! grep -q '<pre class="mermaid"><code>sequenceDiagram' _site/spec/sidecar/index.html ; then
            echo "::error::Sidecar boot sequence is no longer a Mermaid sequenceDiagram block."
            exit 1
          fi
      - name: D4 probe 4 — sidecar page has at least 5 highlighted code blocks
        run: |
          n=$(grep -c '<div class="highlight">' _site/spec/sidecar/index.html || true)
          : "${n:=0}"
          echo "found $n highlight blocks, minimum required is 5"
          if [ "$n" -lt 5 ]; then
            echo "::error::Sidecar page has fewer than 5 highlight blocks - JSON fences are not rendering."
            exit 1
          fi
      - name: D4 probe 5 — UI index 'Working on it locally' bash block is fenced
        run: |
          if ! grep -q '<h2 id="working-on-it-locally">' _site/ui/index.html ; then
            echo "::warning::ui/index.html is missing the heading; skipping fence check."
            exit 0
          fi
          if ! grep -A1 '<h2 id="working-on-it-locally">' _site/ui/index.html | grep -q '<div class="highlight">' ; then
            echo "::error::UI 'Working on it locally' bash block is not rendered as a fenced highlight div."
            exit 1
          fi

      - uses: actions/upload-pages-artifact@v5
        if: github.ref == 'refs/heads/main'
        with:
          path: _site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
