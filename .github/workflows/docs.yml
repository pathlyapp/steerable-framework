name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "packages/agent-ui/ts/**"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "packages/agent-ui/ts/**"
      - ".github/workflows/docs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # --- mkdocs site (Python) -------------------------------------------------
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt
      - run: pip install -r docs/requirements.txt
      - run: mkdocs build --strict --site-dir _site

      # --- Storybook (Node) ----------------------------------------------------
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Storybook is generated *into* the mkdocs site so a single Pages
      # deployment serves both `/` (docs) and `/storybook/` (UI).
      - name: Build Storybook
        env:
          STORYBOOK_DISABLE_TELEMETRY: "1"
          CI: "1"
        run: pnpm --filter @steerable/agent-ui storybook:build
      - name: Embed Storybook into mkdocs site
        run: |
          mkdir -p _site/storybook
          cp -R packages/agent-ui/ts/storybook-static/. _site/storybook/

      # D4 (docs render smoke test): mkdocs build --strict already passes when
      # markdown is *parseable*, but historically that wasn't enough — pinning
      # `pymdown-extensions==10.12` produced fully-built HTML where every
      # fenced code block was rendered as a literal `<p>` containing the
      # backticks (commit 91fb79d). This step grep-asserts the rendered HTML
      # for known signal patterns so the same class of "build green, output
      # broken" regression fails fast in CI.
      - name: smoke-test rendered HTML
        run: |
          set -euo pipefail
          fail=0

          echo "== probe 1: no literal '```' leaked into <p> tags =="
          # Match  <p>``` or <p>`` (in case some renderer escaped one tick).
          if grep -RElh '<p>```' _site --include='*.html' | head -3 ; then
            echo "::error::Literal triple-backtick fence leaked into a <p> — fenced-code parsing is broken."
            grep -REn '<p>```' _site --include='*.html' | head -10
            fail=1
          fi

          echo "== probe 2: home page tier diagram is a Mermaid SVG =="
          if ! grep -q '<pre class="mermaid"><code>graph BT' _site/index.html ; then
            echo "::error::Home page Tier 1→4 diagram is no longer a Mermaid pre.mermaid block."
            fail=1
          fi

          echo "== probe 3: sidecar boot sequence is a Mermaid sequenceDiagram =="
          if ! grep -q '<pre class="mermaid"><code>sequenceDiagram' _site/spec/sidecar/index.html ; then
            echo "::error::Sidecar boot sequence is no longer a Mermaid sequenceDiagram block."
            fail=1
          fi

          echo "== probe 4: sidecar JSON examples have syntax-highlighted fenced blocks =="
          highlight_blocks=$(grep -c '<div class="highlight">' _site/spec/sidecar/index.html || echo 0)
          if [ "${highlight_blocks}" -lt 5 ] ; then
            echo "::error::Sidecar page has only ${highlight_blocks} highlighted code blocks (expected ≥5)."
            fail=1
          fi

          echo "== probe 5: ui index page bash block is a fenced code block =="
          if ! grep -q '<h2 id="working-on-it-locally">' _site/ui/index.html ; then
            echo "::warning::ui/index.html missing the 'Working on it locally' heading; skipping fence check."
          else
            # The next sibling after the <h2> must be a <div class="highlight">,
            # not a <p>``` (which is the buggy unparsed form).
            if ! grep -A1 '<h2 id="working-on-it-locally">' _site/ui/index.html | grep -q '<div class="highlight">' ; then
              echo "::error::ui/index.html 'Working on it locally' bash block is not rendered as a fenced highlight div."
              fail=1
            fi
          fi

          if [ "${fail}" -ne 0 ] ; then
            exit 1
          fi
          echo "All docs render smoke probes passed."

      - uses: actions/upload-pages-artifact@v5
        if: github.ref == 'refs/heads/main'
        with:
          path: _site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
